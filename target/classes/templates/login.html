<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Iniciar sesión')}"></head>
<body>
<div class="login-container">
    <div class="login-card">
        <h2 class="text-center mb-4" style="color:#1E3A5F">ProductividadPlus</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-control" required autofocus/>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required minlength="8"/>
            </div>
            <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
        </form>
        <div class="text-center mt-3">
            <a th:href="@{/recuperar-password}">¿Olvidó su contraseña?</a>
        </div>
    </div>
</div>
</body>
</html>
