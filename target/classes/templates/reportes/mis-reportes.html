<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mis Reportes')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar-empleado}"></div>
<main class="main-content">
    <h2 class="mb-4">Historial de reportes</h2>
    <div class="card">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr><th>Fecha</th><th>Tarea</th><th>Avance</th><th>Tipo</th><th>Descripción</th></tr></thead>
                <tbody>
                <tr th:each="r : ${reportes}">
                    <td th:text="${#temporals.format(r.fecha, 'dd/MM/yyyy')}"></td>
                    <td th:text="${r.tareaTitulo}"></td>
                    <td th:text="${r.avancePorcentaje} + '%'"></td>
                    <td th:text="${r.tipo}"></td>
                    <td th:text="${r.descripcion}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(reportes)}"><td colspan="5" class="text-muted">Sin reportes registrados</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
