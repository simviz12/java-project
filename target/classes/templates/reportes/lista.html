<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reportes')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar-gerente}"></div>
<main class="main-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Reportes del Equipo</h2>
        <a th:href="@{/reportes/exportar-pdf(fechaDesde=${filtroFechaDesde},fechaHasta=${filtroFechaHasta},autorId=${filtroAutor})}"
           class="btn btn-outline-primary">Exportar PDF</a>
    </div>
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-2">
                <div class="col-md-3"><input type="date" name="fechaDesde" class="form-control" th:value="${filtroFechaDesde}"/></div>
                <div class="col-md-3"><input type="date" name="fechaHasta" class="form-control" th:value="${filtroFechaHasta}"/></div>
                <div class="col-md-3">
                    <select name="autorId" class="form-select">
                        <option value="">Todos los empleados</option>
                        <option th:each="e : ${empleados}" th:value="${e.id}" th:text="${e.nombre}"
                                th:selected="${e.id == filtroAutor}"></option>
                    </select>
                </div>
                <div class="col-md-3"><button type="submit" class="btn btn-outline-primary">Filtrar</button></div>
            </form>
        </div>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr><th>Fecha</th><th>Empleado</th><th>Tarea</th><th>Avance</th><th>Tipo</th><th>Descripción</th></tr></thead>
                <tbody>
                <tr th:each="r : ${reportes}">
                    <td th:text="${#temporals.format(r.fecha, 'dd/MM/yyyy')}"></td>
                    <td th:text="${r.autorNombre}"></td>
                    <td th:text="${r.tareaTitulo}"></td>
                    <td th:text="${r.avancePorcentaje} + '%'"></td>
                    <td th:text="${r.tipo}"></td>
                    <td th:text="${r.descripcion}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
