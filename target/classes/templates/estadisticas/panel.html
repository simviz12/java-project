<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Estadísticas')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar-gerente}"></div>
<main class="main-content">
    <h2 class="mb-4">Estadísticas del Equipo</h2>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="stat-card"><div class="text-muted small">Pendientes</div><div class="stat-value" th:text="${globales.tareasPendientes}"></div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="text-muted small">En progreso</div><div class="stat-value" th:text="${globales.tareasEnProgreso}"></div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="text-muted small">Finalizadas</div><div class="stat-value" th:text="${globales.tareasFinalizadas}"></div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="text-muted small">Total reportes</div><div class="stat-value" th:text="${globales.totalReportes}"></div></div></div>
    </div>
    <div class="card">
        <div class="card-header">Estadísticas por empleado</div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr><th>Empleado</th><th>Pendientes</th><th>En progreso</th><th>Finalizadas</th><th>Reportes</th></tr></thead>
                <tbody>
                <tr th:each="e : ${porEmpleado}">
                    <td th:text="${e.empleadoNombre}"></td>
                    <td th:text="${e.tareasPendientes}"></td>
                    <td th:text="${e.tareasEnProgreso}"></td>
                    <td th:text="${e.tareasFinalizadas}"></td>
                    <td th:text="${e.totalReportes}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
