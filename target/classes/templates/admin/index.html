<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Administración')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar-admin}"></div>
<main class="main-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="d-flex justify-content-between mb-4">
        <h2>Administración de usuarios</h2>
        <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-primary">Nuevo usuario</a>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th></tr></thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.nombre}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.rol}"></td>
                    <td><span th:class="${u.activo} ? 'badge bg-success' : 'badge bg-secondary'"
                              th:text="${u.activo} ? 'Sí' : 'No'"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
