<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nuevo Usuario')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar-admin}"></div>
<main class="main-content">
    <h2 class="mb-4">Crear usuario</h2>
    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/usuarios/nuevo}" th:object="${usuario}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" th:field="*{contrasena}" class="form-control" required
                           pattern="^(?=.*[A-Z])(?=.*\d).{8,}$"/>
                    <div class="text-danger small" th:errors="*{contrasena}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select th:field="*{rol}" class="form-select" required>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Crear</button>
                <a th:href="@{/admin}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
