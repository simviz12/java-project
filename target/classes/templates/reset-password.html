<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Restablecer contraseña')}"></head>
<body>
<div class="login-container">
    <div class="login-card">
        <h4 class="mb-3">Nueva contraseña</h4>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/reset-password/{token}(token=${token})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label">Nueva contraseña</label>
                <input type="password" name="contrasena" class="form-control" required
                       pattern="^(?=.*[A-Z])(?=.*\d).{8,}$"
                       title="Mínimo 8 caracteres, una mayúscula y un número"/>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" name="confirmarContrasena" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100">Guardar</button>
        </form>
    </div>
</div>
</body>
</html>
