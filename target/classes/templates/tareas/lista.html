<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Tareas')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar-gerente}"></div>
<main class="main-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Tareas</h2>
        <a th:href="@{/tareas/crear}" class="btn btn-primary">Nueva tarea</a>
    </div>
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-2">
                <div class="col-md-3">
                    <select name="estado" class="form-select">
                        <option value="">Todos los estados</option>
                        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"
                                th:selected="${e == filtroEstado}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select name="responsableId" class="form-select">
                        <option value="">Todos los empleados</option>
                        <option th:each="emp : ${empleados}" th:value="${emp.id}" th:text="${emp.nombre}"
                                th:selected="${emp.id == filtroResponsable}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="date" name="fechaLimite" class="form-control" th:value="${filtroFecha}"/>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-outline-primary">Filtrar</button>
                    <a th:href="@{/tareas}" class="btn btn-outline-secondary">Limpiar</a>
                </div>
            </form>
        </div>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr><th>Título</th><th>Responsable</th><th>Proyecto</th><th>Fecha límite</th><th>Estado</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                <tr th:each="t : ${tareas}" th:classappend="${t.proximaAVencer} ? 'table-proxima'">
                    <td>
                        <span th:text="${t.titulo}"></span>
                        <span th:if="${t.proximaAVencer}" class="badge bg-warning text-dark ms-1">¡Próxima!</span>
                    </td>
                    <td th:text="${t.responsableNombre}"></td>
                    <td th:text="${t.proyectoNombre}"></td>
                    <td th:text="${#temporals.format(t.fechaLimite, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span th:class="${t.estado.name() == 'PENDIENTE'} ? 'badge badge-pendiente' :
                                        (${t.estado.name() == 'EN_PROGRESO'} ? 'badge badge-progreso' : 'badge badge-finalizada')"
                              th:text="${t.estado}"></span>
                    </td>
                    <td>
                        <a th:href="@{/tareas/editar/{id}(id=${t.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                        <form th:action="@{/tareas/eliminar/{id}(id=${t.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('¿Eliminar tarea?')">Eliminar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
