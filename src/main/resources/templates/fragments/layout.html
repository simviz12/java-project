<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' | ProductividadPlus'">ProductividadPlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>

<nav th:fragment="sidebar-gerente" class="sidebar">
    <div class="brand">ProductividadPlus</div>
    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" th:href="@{/dashboard-gerente}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/tareas}">Tareas</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/tareas/crear}">Nueva tarea</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/reportes/globales}">Reportes</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/estadisticas}">Estadísticas</a></li>
        <li class="nav-item mt-4">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="nav-link btn btn-link text-start w-100">Cerrar sesión</button>
            </form>
        </li>
    </ul>
</nav>

<nav th:fragment="sidebar-empleado" class="sidebar">
    <div class="brand">ProductividadPlus</div>
    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" th:href="@{/dashboard-empleado}">Mi panel</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/mis-tareas}">Mis tareas</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/reportes/nuevo}">Nuevo reporte</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/reportes/mis-reportes}">Mis reportes</a></li>
        <li class="nav-item mt-4">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="nav-link btn btn-link text-start w-100">Cerrar sesión</button>
            </form>
        </li>
    </ul>
</nav>

<nav th:fragment="sidebar-admin" class="sidebar">
    <div class="brand">ProductividadPlus</div>
    <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Administración</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/dashboard-gerente}">Panel gerente</a></li>
        <li class="nav-item mt-4">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="nav-link btn btn-link text-start w-100">Cerrar sesión</button>
            </form>
        </li>
    </ul>
</nav>

<div th:fragment="alerts">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
