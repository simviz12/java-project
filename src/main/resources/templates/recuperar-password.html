<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Recuperar contraseña')}"></head>
<body>
<div class="login-container">
    <div class="login-card">
        <h4 class="mb-3">Recuperar contraseña</h4>
        <form th:action="@{/recuperar-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label">Email registrado</label>
                <input type="email" name="email" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar enlace</button>
        </form>
        <div class="text-center mt-3"><a th:href="@{/login}">Volver al login</a></div>
    </div>
</div>
</body>
</html>
