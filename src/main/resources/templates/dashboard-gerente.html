<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard Gerente')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar-gerente}"></div>
<main class="main-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <h2 class="mb-4">Panel del Gerente</h2>
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="text-muted small">Pendientes</div>
                <div class="stat-value" th:text="${estadisticas.tareasPendientes}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="text-muted small">En progreso</div>
                <div class="stat-value" th:text="${estadisticas.tareasEnProgreso}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="text-muted small">Finalizadas</div>
                <div class="stat-value" th:text="${estadisticas.tareasFinalizadas}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="text-muted small">Reportes</div>
                <div class="stat-value" th:text="${estadisticas.totalReportes}">0</div>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Tareas recientes</span>
            <a th:href="@{/tareas/crear}" class="btn btn-sm btn-primary">Nueva tarea</a>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead><tr><th>Título</th><th>Responsable</th><th>Fecha límite</th><th>Estado</th></tr></thead>
                <tbody>
                <tr th:each="t : ${tareas}" th:classappend="${t.proximaAVencer} ? 'table-proxima'">
                    <td th:text="${t.titulo}"></td>
                    <td th:text="${t.responsableNombre}"></td>
                    <td th:text="${#temporals.format(t.fechaLimite, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span th:class="${t.estado.name() == 'PENDIENTE'} ? 'badge badge-pendiente' :
                                        (${t.estado.name() == 'EN_PROGRESO'} ? 'badge badge-progreso' : 'badge badge-finalizada')"
                              th:text="${t.estado}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
